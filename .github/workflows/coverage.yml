name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - run: cargo install cargo-llvm-cov
      - run: cd rust && cargo llvm-cov --lcov --output-path ../rust.lcov
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust.lcov
          flags: rust

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-cov
          cd python/samp-crypto && maturin develop && cd ../..
          cd python && pip install -e .
          pytest tests/ --cov=samp --cov-report lcov:../python.lcov
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: python.lcov
          flags: python

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: cd typescript && npm ci && npx vitest run --coverage
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: typescript/coverage/lcov.info
          flags: typescript

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go/go.sum
      - run: cd go && go test -coverprofile=coverage.out ./...
      - uses: jandelgado/gcov2lcov-action@v1
        with:
          infile: go/coverage.out
          outfile: go.lcov
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: go.lcov
          flags: go
